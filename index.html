<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <div class="calculator">

       <button id="more-btn" class="function">MORE</button>

        <input id="display" placeholder="0" readonly>

        <div id="extra-buttons" class="hidden">

            <button class="function">(</button>
            <button class="function">)</button>

            <button class="function">MR</button>
            <button class="function">RAND</button>

            <button class="function">π</button>
            <button class="function">x²</button>

            <button class="function">x³</button>

            <button class="function">e^x</button>

            <button class="function" id="angle-mode">DEG</button>

            <button class="function">sin</button>
            <button class="function">cos</button>

        </div>

        <div id="buttons">

            <button class="function">DEL</button>
            <button class="function">AC</button>
            <button class="function">%</button>
            <button class="operator">/</button>

            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator">*</button>

            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator">-</button>

            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator">+</button>

            <button class="number">+/-</button>
            <button class="number">0</button>
            <button class="number">,</button>
            <button class="operator">=</button>

        </div>

    </div>

</body>
</html>
